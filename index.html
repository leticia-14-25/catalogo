<style>
body {
  font-family: Arial;
  background: #e8f5e9;
  margin: 0;
}

/* TOPO */
.topo {
  background: #1b5e20;
  padding: 20px;
  text-align: center;
  color: white;
}

.topo h1 {
  margin: 0;
}

/* BARRA DE BUSCA */
.barra {
  padding: 15px;
  text-align: center;
  background: #2e7d32;
}

.barra input {
  width: 80%;
  max-width: 400px;
  padding: 10px;
  border-radius: 8px;
  border: none;
  font-size: 16px;
}

/* FILTROS */
.filtros {
  text-align: center;
  padding: 10px;
}

.filtros button {
  margin: 5px;
  padding: 8px 15px;
  border: none;
  border-radius: 20px;
  background: #66bb6a;
  color: white;
  cursor: pointer;
}

/* PRODUTOS */
.container {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 20px;
  padding: 20px;
}

.produto {
  background: white;
  padding: 10px;
  border-radius: 12px;
  text-align: center;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  transition: 0.3s;
}

.produto:hover {
  transform: scale(1.03);
}

.produto img {
  width: 100%;
  height: 180px;
  object-fit: contain;
  background: #fff;
  border-radius: 8px;
}

.nome {
  font-weight: bold;
  margin: 10px 0;
}

.preco {
  color: #ff6b00;
  font-weight: bold;
}

.botao {
  display: inline-block;
  margin-top: 8px;
  padding: 8px 12px;
  background: #25D366;
  color: white;
  border-radius: 5px;
  text-decoration: none;
}
</style>
</head>

const container = document.getElementById("listaProdutos");

// MOSTRAR
function mostrar(lista) {
  container.innerHTML = "";

  lista.forEach(produto => {
    const link = `https://wa.me/556184219570?text=Olá,%20quero%20${produto.nome}`;

    container.innerHTML += `
      <div class="produto">
        <img src="${produto.imagem}">
        <div class="nome">${produto.nome}</div>
        <div class="preco">R$ ${produto.preco}</div>
        <a class="botao" href="${link}">Comprar</a>
      </div>
    `;
  });
}

// FILTRO
function filtrar(tipo) {
  if (tipo === "todos") {
    mostrar(produtos);
  } else {
    mostrar(produtos.filter(p => p.categoria === tipo));
  }
}

// PESQUISA
document.getElementById("pesquisa").addEventListener("input", function() {
  const valor = this.value.toLowerCase();

  const resultado = produtos.filter(p =>
    p.nome.toLowerCase().includes(valor)
  );

  mostrar(resultado);
});
